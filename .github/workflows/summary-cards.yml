name: Profile Summary Cards

on:
  # 每天 UTC 00:00 自动刷新
  schedule:
    - cron: "0 0 * * *"
  # 支持手动触发
  workflow_dispatch:

# Action 需要写权限才能把生成的卡片提交回 main 分支
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: HotRiceNoodles
          BRANCH_NAME: main
          UTC_OFFSET: 8
